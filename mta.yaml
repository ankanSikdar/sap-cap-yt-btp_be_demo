_schema-version: 3.3.0
ID: btp_be_demo
version: 1.0.1
description: A simple CAP project.
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: btp_be_demo-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: '${default-url}'
    requires:
      - name: btp_be_demo-db
      - name: central_db_employee
        group: SERVICE_REPLACEMENTS
        properties:
          key: central-db-employee
          service: central-db-service-name
  - name: btp_be_demo-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: btp_be_demo-db
        properties:
          TARGET_CONTAINER: '~{hdi-container-name}'
resources:
  - name: btp_be_demo-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-container-name: '${service-name}'
  - name: central_db_employee
    type: org.cloudfoundry.existing-service
    description: Central DB Service
    parameters:
      service-name: hdi_central_db_employee
    properties:
      central-db-service-name: '${service-name}'
